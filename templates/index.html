<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BI Natural-Language-to-SQL</title>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; max-width: 820px; margin: 40px auto; padding: 0 16px; color: #1a1a1a; }
  h1 { font-size: 1.5rem; margin-bottom: 4px; }
  .subtitle { color: #666; margin-bottom: 24px; }
  textarea { width: 100%; box-sizing: border-box; padding: 10px; font-size: 1rem; border: 1px solid #ccc; border-radius: 6px; }
  button { margin-top: 8px; padding: 8px 18px; font-size: 1rem; background: #2b6cb0; color: white; border: none; border-radius: 6px; cursor: pointer; }
  button:hover { background: #2c5282; }
  .examples { margin: 16px 0; }
  .examples span { display: inline-block; background: #edf2f7; padding: 4px 10px; margin: 3px; border-radius: 12px; font-size: 0.85rem; cursor: pointer; }
  .examples span:hover { background: #e2e8f0; }
  pre { background: #1a202c; color: #e2e8f0; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 0.85rem; }
  table { border-collapse: collapse; width: 100%; margin-top: 12px; }
  th, td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; font-size: 0.9rem; }
  th { background: #f7fafc; }
  .error { color: #c53030; margin-top: 12px; }
  .caption { font-weight: 600; margin-top: 16px; }
  .schema { background: #f7fafc; padding: 10px; border-radius: 6px; font-size: 0.85rem; white-space: pre-wrap; }
</style>
</head>
<body>
  <h1>BI Natural-Language-to-SQL</h1>
  <p class="subtitle">Day 2 of a daily AI-app series (BI focus). Ask a plain-English business question, get back the SQL and the answer.</p>

  <details>
    <summary>Database schema</summary>
    <div class="schema">{{ schema }}</div>
  </details>

  <div class="examples">
    {% for ex in examples %}
      <span onclick="document.getElementById('q').value = this.textContent; runQuery();">{{ ex }}</span>
    {% endfor %}
  </div>

  <textarea id="q" rows="2" placeholder="e.g. top 5 products by revenue"></textarea><br>
  <button onclick="runQuery()">Ask</button>

  <div id="result"></div>

<script>
async function runQuery() {
  const question = document.getElementById('q').value;
  const resultDiv = document.getElementById('result');
  resultDiv.innerHTML = 'Loading...';

  try {
    const res = await fetch('/query', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({question})
    });
    const data = await res.json();

    if (!res.ok) {
      resultDiv.innerHTML = `<div class="error">${data.error}</div>`;
      return;
    }

    let html = `<div class="caption">${data.caption}</div>`;
    html += `<pre>${data.sql}</pre>`;
    html += '<table><thead><tr>' + data.columns.map(c => `<th>${c}</th>`).join('') + '</tr></thead><tbody>';
    for (const row of data.rows) {
      html += '<tr>' + row.map(v => `<td>${v}</td>`).join('') + '</tr>';
    }
    html += '</tbody></table>';
    resultDiv.innerHTML = html;
  } catch (err) {
    resultDiv.innerHTML = `<div class="error">Request failed: ${err}</div>`;
  }
}
</script>
</body>
</html>
